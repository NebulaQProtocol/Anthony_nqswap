services:
  mock-servers:
    build:
      context: ./mock
      dockerfile: Dockerfile
    ports:
      - '8080:8080'  # WebSocket server
      - '8081:8081'  # RPC server
    environment:
      - MOCK_UPDATE_RATE=100
      - MOCK_REORG_RATE=0.05
      - WS_PORT=8080
      - RPC_PORT=8081

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - MOCK_WS_URL=ws://mock-servers:8080
      - MOCK_RPC_URL=http://mock-servers:8081
    depends_on:
      - mock-servers
